<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Quest Memory — Side Story Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #ffffff;
            font-family: 'Caveat', cursive;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; padding: 24px 16px 40px;
            color: #1a1a1a;
        }

        .brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; }
        .brand img { width: 72px; filter: brightness(0); margin-bottom: 0; }

        .main-heading { font-size: 2.4rem; font-weight: 700; text-align: center; margin-bottom: 4px; line-height: 1.2; color: #1a1a1a; }
        .sub-heading   { font-size: 1.1rem; color: rgba(0,0,0,0.6); text-align: center; margin-bottom: 20px; }

        .photo-wrap {
            width: 100%; max-width: 360px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); margin-bottom: 28px;
            border: 1px solid rgba(0,0,0,0.08);
        }
        .photo-wrap img { width: 100%; display: block; }

        /* Pixel-style button dengan Pixelify Sans */
        .btn-download {
            display: table;
            margin: 0 auto 24px auto;
            padding: 8px 20px;
            color: #fff;
            text-decoration: none;
            font-family: 'Pixelify Sans', cursive;
            font-size: 1.2rem;
            font-weight: 700;
            background: #1a1a1a;
            border: 4px solid #1a1a1a;
            box-shadow:
                0 -4px #1a1a1a, 0 4px #1a1a1a, -4px 0 #1a1a1a, 4px 0 #1a1a1a,
                0 -8px #000000, 0 8px #000000, -8px 0 #000000, 8px 0 #000000;
        }
        .btn-download:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }

        .expiry-box {
            background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.08);
            border-radius: 16px; padding: 16px 24px;
            text-align: center; max-width: 360px; width: 100%; margin-bottom: 24px;
        }
        .expiry-label { font-size: 0.82rem; color: rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
        .expiry-days  { font-size: 2rem; font-weight: 700; }
        .expiry-note  { font-size: 0.9rem; color: rgba(0,0,0,0.55); margin-top: 6px; line-height: 1.5; }

        /* Expired state */
        .expired-box {
            background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.08);
            border-radius: 20px; padding: 28px 32px; max-width: 340px; width: 100%;
            text-align: center; margin: 16px 0;
        }
        .expired-box p { font-size: 1.1rem; color: rgba(0,0,0,0.6); line-height: 1.7; }

        /* Mimic illustration — contrast tinggi agar garis pensil lebih bold di background putih */
        .mimic-img {
            width: min(280px, 70vw);
            display: block;
            margin: 20px auto 4px;
        }

        .loading { color: rgba(0,0,0,0.5); font-size: 1.1rem; margin-top: 60px; }

        .footer { font-size: 0.78rem; color: rgba(0,0,0,0.4); text-align: center; line-height: 1.8; margin-top: auto; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="brand">
        <img src="https://res.cloudinary.com/dnqt7v5iv/image/upload/v1780756193/logo_xsbo10.png"
             alt="Side Story Club" onerror="this.style.display='none'">
    </div>

    <div id="app">
        <p class="loading">⏳ Loading data...</p>
    </div>

    <div class="footer" id="footer" style="display:none;">
        This reward is available for up to 7 days.<br>
        Save it to your memory vault before this adventure expires.
    </div>

<script>
    const params     = new URLSearchParams(window.location.search);
    const photoUrl   = params.get('url');
    const ts         = parseInt(params.get('ts') || '0');
    const EXPIRY_DAYS = 7;

    const nowSeconds = Date.now() / 1000;
    const ageDays    = (nowSeconds - ts) / 86400;
    const sisaHari   = Math.max(0, EXPIRY_DAYS - Math.floor(ageDays));
    const isExpired  = ageDays > EXPIRY_DAYS || !photoUrl || !ts;

    const app    = document.getElementById('app');
    const footer = document.getElementById('footer');

    if (isExpired) {
        // ── Halaman Expired dengan Mimic Illustration ──
        app.innerHTML = `
            <img class="mimic-img"
                 src="https://res.cloudinary.com/dnqt7v5iv/image/upload/v1781584642/Mimic-1_inxisl.png"
                 alt="Mimic Monster">

            <h1 class="main-heading" style="margin-top: 8px;">
                Quest Memory<br>Has Expired
            </h1>

            <div class="expired-box">
                <p>
                    The <b>${EXPIRY_DAYS}-day</b> storage period for this memory
                    has already passed.<br><br>
                    Your photo data in the Memory Codex
                    has been automatically removed.
                </p>
            </div>

            <p style="font-size:1.1rem; color:rgba(0,0,0,0.5); text-align:center; margin-top:8px;">
                Start a new quest at your next<br>Side Story Club session! ✨
            </p>`;

    } else {
        // ── Halaman Download Normal ──
        const warna = sisaHari <= 1 ? '#e63946' : (sisaHari <= 3 ? '#e6a100' : '#2a9d8f');

        app.innerHTML = `
            <h1 class="main-heading">Quest Memory<br>Unlocked!</h1>
            <p class="sub-heading">Your memory from today has been successfully loaded.</p>

            <div class="photo-wrap">
                <img src="${escHtml(photoUrl)}" alt="Side Story Club Photo"
                     onerror="this.parentElement.innerHTML='<p style=padding:40px;text-align:center;color:#666;font-size:1rem;>Failed to load photo archive.<br>Please try refreshing this page.</p>'">
            </div>

            <a href="${escHtml(photoUrl)}" download="SSC_foto.jpg" class="btn-download"
               onclick="handleDownload(event, '${escHtml(photoUrl)}')">
               Download Photo
            </a>

            <div class="expiry-box">
                <div class="expiry-label">⏳ Storage Time Remaining</div>
                ${sisaHari > 0
                    ? `<div class="expiry-days" style="color:${warna};">${sisaHari} Days Left</div>
                       <div class="expiry-note">
                           Available until the storage period ends.<br>
                           Save your adventure memory now!
                       </div>`
                    : `<div class="expiry-days" style="color:#e63946;">Last Day!</div>
                       <div class="expiry-note">This reward expires tonight. Save it now!</div>`
                }
            </div>`;
        footer.style.display = 'block';
    }

    function escHtml(str) {
        return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function handleDownload(e, url) {
        if (url.includes('cloudinary.com')) {
            e.preventDefault();
            const dlUrl = url.replace('/upload/', '/upload/fl_attachment/');
            window.open(dlUrl, '_blank');
        }
    }
</script>

</body>
</html>
